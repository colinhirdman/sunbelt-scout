name: Sunbelt Scout

on:
  schedule:
    - cron: '0 17 * * 1-5'  # Weekdays at noon CT (UTC-5)
  workflow_dispatch:          # Allow manual runs from GitHub UI

jobs:
  scout:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install requests pyyaml beautifulsoup4 lxml anthropic

      - name: Run scout
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: python3 run.py

      - name: Commit updated data
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add output/sunbelt.csv output/calhoun.csv
          git diff --cached --quiet || git commit -m "Auto: scout run $(date -u +%Y-%m-%d)"
          git push
